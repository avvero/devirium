name: Send Notes on Commit

on:
  workflow_run:
    workflows: ["Deploy Quartz site to GitHub Pages"]
    types:
      - completed

jobs:
  send-notes:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Publish changed notes
        working-directory: tools/publisher
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          DEVIRIUM_CHAT_ID: ${{ secrets.DEVIRIUM_CHAT_ID }}
          DEVIRIUM_GARDENER_CHAT_ID: ${{ secrets.DEVIRIUM_GARDENER_CHAT_ID }}
          OPENAI_TOKEN: ${{ secrets.OPENAI_TOKEN }}
          DEVIRIUM_LINK: ${{ secrets.DEVIRIUM_LINK }}
        run: |
          if git -C "$GITHUB_WORKSPACE" rev-parse HEAD~1 >/dev/null 2>&1; then
            BASE=HEAD~1
          else
            BASE=
          fi
          go run ./cmd/publisher --repo "$GITHUB_WORKSPACE" --base "$BASE" --head HEAD
